<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/login.css" />

    <title>Login - Mercado Trilhas</title>
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <h2>Bem-vindo</h2>
        <p>Faça login para acessar a sua conta</p>
        <input class="input" type="email" id="email" placeholder="E-mail" />
        <input
          class="input"
          type="password"
          id="password"
          placeholder="Senha"
        />
        <button class="btn" id="loginButton" onclick="login()">Entrar</button>
        <div class="novousuario">
          <p>Novo usuário?</p>
          <a href="register.html" class="link">Criar Conta</a>
        </div>
      </div>
    </div>
    <script src="./assets/js/login.js"></script>
  </body>
</html>
